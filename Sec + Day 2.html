<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CompTIA Security+ Quiz – Practical Cryptography & IAM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
    }
    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #1f2937;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
      color: #facc15;
    }
    header p {
      margin: 5px 0 0;
      color: #9ca3af;
    }
    main {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #111827;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    #quiz-container {
      margin-top: 10px;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .question-number {
      font-weight: bold;
      color: #93c5fd;
    }
    .question-text {
      font-size: 18px;
      margin: 10px 0 15px;
    }
    .options {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .options li {
      margin-bottom: 8px;
    }
    .options label {
      display: block;
      padding: 8px 10px;
      border-radius: 4px;
      background: #1f2937;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .options input[type="radio"] {
      margin-right: 8px;
    }
    .options label:hover {
      background: #111827;
      border-color: #3b82f6;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 18px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    #prev-btn {
      background: #4b5563;
      color: #e5e7eb;
    }
    #next-btn {
      background: #3b82f6;
      color: #e5e7eb;
    }
    #submit-btn {
      background: #22c55e;
      color: #022c22;
    }
    #restart-btn {
      background: #f97316;
      color: #111827;
      display: none;
    }
    #feedback {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      background: #020617;
      border: 1px solid #1f2937;
      min-height: 40px;
      font-size: 14px;
    }
    .feedback-correct {
      color: #22c55e;
    }
    .feedback-incorrect {
      color: #f97316;
    }
    #score-summary {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      background: #020617;
      border: 1px solid #1f2937;
      display: none;
    }
    #progress {
      margin-top: 10px;
      font-size: 13px;
      color: #9ca3af;
    }
    .highlight-correct {
      border-color: #22c55e !important;
      background: #064e3b !important;
    }
    .highlight-incorrect {
      border-color: #f97316 !important;
      background: #7c2d12 !important;
    }
  </style>
</head>
<body>
  <header>
    <h1>CompTIA Security+ Quiz</h1>
    <p>Practical Cryptography & Identity and Access Management (30 Questions)</p>
  </header>

  <main>
    <div id="quiz-container">
      <div class="question-header">
        <div class="question-number" id="question-number"></div>
        <div id="progress"></div>
      </div>
      <div class="question-text" id="question-text"></div>
      <ul class="options" id="options-list"></ul>

      <div id="feedback"></div>

      <div class="controls">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
        <button id="submit-btn">Submit Quiz</button>
        <button id="restart-btn">Restart Quiz</button>
      </div>

      <div id="score-summary"></div>
    </div>
  </main>

  <script>
    // =========================
    // Quiz Data
    // =========================
    const questions = [
      {
        question: "Which cryptographic property ensures that data has not been altered between sender and receiver?",
        options: [
          "Confidentiality",
          "Integrity",
          "Availability",
          "Obfuscation"
        ],
        answer: 1,
        explanation: "Integrity ensures that data remains unmodified; hashing and digital signatures are common mechanisms."
      },
      {
        question: "Which of the following is a symmetric block cipher commonly used for VPNs and full-disk encryption?",
        options: [
          "RSA",
          "ECC",
          "AES",
          "Diffie-Hellman"
        ],
        answer: 2,
        explanation: "AES is a symmetric block cipher widely used for VPNs, disk encryption, and many other secure applications."
      },
      {
        question: "A company wants to securely exchange a symmetric key over an insecure channel. Which algorithm is BEST suited?",
        options: [
          "AES",
          "Diffie-Hellman",
          "SHA-256",
          "MD5"
        ],
        answer: 1,
        explanation: "Diffie-Hellman is designed for secure key exchange over an insecure channel."
      },
      {
        question: "Which of the following is primarily used to provide non-repudiation?",
        options: [
          "Symmetric encryption",
          "Hashing",
          "Digital signatures",
          "Steganography"
        ],
        answer: 2,
        explanation: "Digital signatures provide integrity, authentication, and non-repudiation by binding a signer to the message."
      },
      {
        question: "Which hashing algorithm is considered broken and should NOT be used for security purposes?",
        options: [
          "SHA-256",
          "SHA-3",
          "MD5",
          "BLAKE2"
        ],
        answer: 2,
        explanation: "MD5 is vulnerable to collisions and is no longer considered secure for cryptographic use."
      },
      {
        question: "Which concept describes adding random data to a password before hashing to defend against rainbow table attacks?",
        options: [
          "Key stretching",
          "Salting",
          "Peppering",
          "Key escrow"
        ],
        answer: 1,
        explanation: "Salting adds unique random data to each password before hashing, making precomputed tables ineffective."
      },
      {
        question: "Which of the following BEST describes perfect forward secrecy (PFS)?",
        options: [
          "Using the same key for encryption and decryption",
          "Ensuring that compromise of a long-term key does not compromise past session keys",
          "Using a longer key length than required",
          "Encrypting data at rest and in transit"
        ],
        answer: 1,
        explanation: "PFS ensures that even if a long-term key is compromised, past session keys remain secure."
      },
      {
        question: "Which protocol is commonly used to provide secure email with digital signatures and encryption?",
        options: [
          "S/MIME",
          "SNMPv3",
          "SRTP",
          "FTPS"
        ],
        answer: 0,
        explanation: "S/MIME provides secure email with encryption and digital signatures using X.509 certificates."
      },
      {
        question: "Which of the following is an example of asymmetric encryption?",
        options: [
          "AES-256",
          "3DES",
          "RSA",
          "ChaCha20"
        ],
        answer: 2,
        explanation: "RSA is a widely used asymmetric (public key) cryptographic algorithm."
      },
      {
        question: "A security engineer needs to verify that a downloaded file has not been tampered with. Which is the BEST method?",
        options: [
          "Compare the file size",
          "Check the file's digital signature or hash",
          "Open the file and visually inspect it",
          "Re-download the file from another mirror"
        ],
        answer: 1,
        explanation: "Verifying a cryptographic hash or digital signature ensures the file's integrity."
      },
      {
        question: "Which of the following is a key stretching algorithm commonly used for password hashing?",
        options: [
          "PBKDF2",
          "RSA",
          "Diffie-Hellman",
          "SHA-1"
        ],
        answer: 0,
        explanation: "PBKDF2 is a key stretching algorithm that applies a hash function many times to slow down brute-force attacks."
      },
      {
        question: "Which cryptographic concept ensures that the same plaintext will not always produce the same ciphertext?",
        options: [
          "Initialization vector (IV)",
          "Key escrow",
          "Key wrapping",
          "Certificate pinning"
        ],
        answer: 0,
        explanation: "An IV introduces randomness so that identical plaintexts encrypt to different ciphertexts."
      },
      {
        question: "Which of the following BEST describes a digital certificate?",
        options: [
          "A symmetric key used for bulk encryption",
          "A signed binding between a public key and an identity",
          "A random number used for key generation",
          "A hardware token used for MFA"
        ],
        answer: 1,
        explanation: "A digital certificate binds a public key to an identity and is signed by a CA."
      },
      {
        question: "Which access control model uses labels such as 'Secret' and 'Top Secret' and enforces access based on clearance?",
        options: [
          "Discretionary Access Control (DAC)",
          "Mandatory Access Control (MAC)",
          "Role-Based Access Control (RBAC)",
          "Rule-Based Access Control"
        ],
        answer: 1,
        explanation: "MAC uses labels and clearances, with access decisions enforced by a central authority."
      },
      {
        question: "In Role-Based Access Control (RBAC), permissions are primarily assigned to:",
        options: [
          "Users directly",
          "Roles",
          "Objects",
          "Networks"
        ],
        answer: 1,
        explanation: "In RBAC, permissions are assigned to roles, and users are assigned to those roles."
      },
      {
        question: "Which of the following is an example of something you HAVE in multifactor authentication?",
        options: [
          "Password",
          "PIN",
          "Smart card",
          "Fingerprint"
        ],
        answer: 2,
        explanation: "A smart card is a physical token and represents 'something you have'."
      },
      {
        question: "Which protocol is commonly used for centralized authentication, authorization, and accounting for network devices?",
        options: [
          "RADIUS",
          "DNSSEC",
          "SFTP",
          "NTP"
        ],
        answer: 0,
        explanation: "RADIUS provides centralized AAA services for network access and devices."
      },
      {
        question: "Which protocol is often used for secure, ticket-based authentication in Windows domains?",
        options: [
          "TACACS+",
          "Kerberos",
          "LDAP",
          "SAML"
        ],
        answer: 1,
        explanation: "Kerberos uses tickets and symmetric cryptography for secure authentication in domains."
      },
      {
        question: "Which of the following BEST describes single sign-on (SSO)?",
        options: [
          "Using multiple passwords for different systems",
          "Using one set of credentials to access multiple systems",
          "Using a hardware token for every login",
          "Using a local account instead of a domain account"
        ],
        answer: 1,
        explanation: "SSO allows a user to authenticate once and gain access to multiple systems or applications."
      },
      {
        question: "Which standard is commonly used to provide federated identity and SSO between organizations using XML-based assertions?",
        options: [
          "SAML",
          "OAuth 2.0",
          "OpenID Connect",
          "RADIUS"
        ],
        answer: 0,
        explanation: "SAML uses XML-based assertions for federated identity and SSO between identity and service providers."
      },
      {
        question: "Which of the following is MOST associated with authorization of API calls and delegated access?",
        options: [
          "SAML",
          "OAuth 2.0",
          "Kerberos",
          "CHAP"
        ],
        answer: 1,
        explanation: "OAuth 2.0 is commonly used for delegated authorization, especially for APIs."
      },
      {
        question: "Which identity concept describes a centralized directory that stores user accounts and attributes?",
        options: [
          "RADIUS",
          "LDAP directory",
          "TACACS+ server",
          "NTP server"
        ],
        answer: 1,
        explanation: "LDAP directories (like Active Directory) store user accounts, groups, and attributes centrally."
      },
      {
        question: "A security team wants to enforce that users only have the minimum permissions necessary to perform their jobs. This is an example of:",
        options: [
          "Separation of duties",
          "Job rotation",
          "Least privilege",
          "Mandatory vacations"
        ],
        answer: 2,
        explanation: "Least privilege ensures users have only the access they need and no more."
      },
      {
        question: "Which of the following BEST describes separation of duties?",
        options: [
          "Requiring two people to approve all changes",
          "Ensuring that critical tasks are divided among multiple people",
          "Rotating employees through different roles",
          "Requiring strong passwords"
        ],
        answer: 1,
        explanation: "Separation of duties divides critical tasks so no single person can complete them alone, reducing fraud risk."
      },
      {
        question: "Which authentication factor category does a retina scan fall under?",
        options: [
          "Something you know",
          "Something you have",
          "Something you are",
          "Somewhere you are"
        ],
        answer: 2,
        explanation: "Biometric identifiers like retina scans are 'something you are'."
      },
      {
        question: "Which of the following is a common risk of using shared accounts?",
        options: [
          "Improved accountability",
          "Simplified auditing",
          "Lack of non-repudiation",
          "Stronger authentication"
        ],
        answer: 2,
        explanation: "Shared accounts make it difficult to attribute actions to a specific individual, reducing accountability."
      },
      {
        question: "Which cryptographic attack attempts to find two different inputs that produce the same hash value?",
        options: [
          "Brute-force attack",
          "Collision attack",
          "Birthday attack",
          "Replay attack"
        ],
        answer: 1,
        explanation: "A collision attack aims to find two distinct inputs with the same hash output."
      },
      {
        question: "Which of the following is MOST appropriate for encrypting large amounts of data on a storage device?",
        options: [
          "RSA",
          "ECC",
          "AES",
          "DSA"
        ],
        answer: 2,
        explanation: "AES, a symmetric cipher, is efficient and commonly used for bulk data encryption such as full-disk encryption."
      },
      {
        question: "Which identity and access management concept ensures that user access is reviewed and adjusted when roles change?",
        options: [
          "Onboarding",
          "Offboarding",
          "Access recertification (account review)",
          "Password rotation"
        ],
        answer: 2,
        explanation: "Access recertification periodically reviews user access to ensure it still aligns with job responsibilities."
      },
      {
        question: "Which of the following BEST describes just-in-time (JIT) access?",
        options: [
          "Permanent elevated privileges for administrators",
          "Granting elevated access only when needed and for a limited time",
          "Using shared admin accounts",
          "Using static passwords for service accounts"
        ],
        answer: 1,
        explanation: "JIT access provides temporary, time-bound elevated privileges only when required, reducing risk."
      }
    ];

    // =========================
    // Quiz Engine
    // =========================
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let quizSubmitted = false;

    const questionNumberEl = document.getElementById("question-number");
    const questionTextEl = document.getElementById("question-text");
    const optionsListEl = document.getElementById("options-list");
    const feedbackEl = document.getElementById("feedback");
    const scoreSummaryEl = document.getElementById("score-summary");
    const progressEl = document.getElementById("progress");

    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const submitBtn = document.getElementById("submit-btn");
    const restartBtn = document.getElementById("restart-btn");

    function renderQuestion(index) {
      const q = questions[index];
      questionNumberEl.textContent = `Question ${index + 1} of ${questions.length}`;
      questionTextEl.textContent = q.question;
      progressEl.textContent = `Answered: ${userAnswers.filter(a => a !== null).length}/${questions.length}`;

      optionsListEl.innerHTML = "";
      feedbackEl.textContent = "";
      feedbackEl.className = "";
      
      q.options.forEach((opt, i) => {
        const li = document.createElement("li");
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = i;

        if (userAnswers[index] === i) {
          input.checked = true;
        }

        input.addEventListener("change", () => {
          userAnswers[index] = i;
          if (!quizSubmitted) {
            showImmediateFeedback(index);
          }
        });

        label.appendChild(input);
        label.appendChild(document.createTextNode(opt));
        li.appendChild(label);
        optionsListEl.appendChild(li);
      });

      if (quizSubmitted) {
        highlightAnswers(index);
        showImmediateFeedback(index);
      }

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === questions.length - 1;
    }

    function showImmediateFeedback(index) {
      const q = questions[index];
      const userAnswer = userAnswers[index];

      if (userAnswer === null) {
        feedbackEl.textContent = "Select an answer to see feedback.";
        feedbackEl.className = "";
        return;
      }

      const isCorrect = userAnswer === q.answer;
      feedbackEl.textContent = (isCorrect ? "Correct: " : "Incorrect: ") + q.explanation;
      feedbackEl.className = isCorrect ? "feedback-correct" : "feedback-incorrect";
    }

    function highlightAnswers(index) {
      const q = questions[index];
      const userAnswer = userAnswers[index];

      const labels = optionsListEl.querySelectorAll("label");
      labels.forEach((label, i) => {
        label.classList.remove("highlight-correct", "highlight-incorrect");
        if (i === q.answer) {
          label.classList.add("highlight-correct");
        }
        if (userAnswer !== null && i === userAnswer && userAnswer !== q.answer) {
          label.classList.add("highlight-incorrect");
        }
      });
    }

    function calculateScore() {
      let correct = 0;
      questions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) correct++;
      });
      return correct;
    }

    function submitQuiz() {
      quizSubmitted = true;
      const score = calculateScore();
      const total = questions.length;
      const percent = ((score / total) * 100).toFixed(1);

      scoreSummaryEl.style.display = "block";
      scoreSummaryEl.innerHTML = `
        <strong>Quiz Submitted</strong><br>
        Score: ${score} / ${total} (${percent}%)<br>
        Review each question to see correct and incorrect answers highlighted.
      `;

      restartBtn.style.display = "inline-block";
      highlightAnswers(currentQuestionIndex);
      showImmediateFeedback(currentQuestionIndex);
    }

    function restartQuiz() {
      userAnswers = new Array(questions.length).fill(null);
      currentQuestionIndex = 0;
      quizSubmitted = false;
      scoreSummaryEl.style.display = "none";
      restartBtn.style.display = "none";
      renderQuestion(currentQuestionIndex);
    }

    prevBtn.addEventListener("click", () => {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion(currentQuestionIndex);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion(currentQuestionIndex);
      }
    });

    submitBtn.addEventListener("click", () => {
      if (userAnswers.includes(null) && !confirm("Some questions are unanswered. Submit anyway?")) {
        return;
      }
      submitQuiz();
    });

    restartBtn.addEventListener("click", restartQuiz);

    // Initial render
    renderQuestion(currentQuestionIndex);
  </script>
</body>
</html>
