<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA Security+ — Fundamental Security Concepts Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        background: #0d0d0f;
        color: #e6e6e6;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
    }

    h1 {
        text-align: center;
        padding: 20px;
        color: #4fc3f7;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .quiz-container {
        width: 90%;
        max-width: 900px;
        margin: 20px auto;
        background: #1a1a1d;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .question-block {
        background: #222226;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        border-left: 4px solid #4fc3f7;
    }

    .answers label {
        display: block;
        padding: 10px;
        margin: 6px 0;
        background: #2c2c31;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .answers label:hover {
        background: #3a3a40;
    }

    .explanation {
        display: none;
        background: #111114;
        padding: 10px;
        margin-top: 10px;
        border-left: 4px solid #ffca28;
        border-radius: 6px;
        font-size: 0.95em;
    }

    button {
        background: #4fc3f7;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
        margin-top: 20px;
        width: 100%;
        font-weight: 600;
    }

    button:hover {
        background: #81d4fa;
    }

    .result {
        text-align: center;
        font-size: 1.4em;
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>

function renderQuiz() {
    let quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        let block = document.createElement("div");
        block.className = "question-block";

        let html = `
            <h3>${index + 1}. ${q.question}</h3>
            <div class="answers">
        `;

        // Keep A, B, C, D in order
        const letters = ["A", "B", "C", "D"];
        letters.forEach(letter => {
            html += `
                <label onclick="checkAnswer(${q.id}, '${letter}')">
                    <input type="radio" name="q${q.id}" value="${letter}">
                    <strong>${letter}.</strong> ${q.answers[letter]}
                </label>
            `;
        });

        html += `
            </div>
            <div class="explanation" id="exp${q.id}">
                <strong>Explanation:</strong> ${q.explanation}
            </div>
            <div id="fb${q.id}" style="margin-top:8px;font-weight:bold;"></div>
        `;

        block.innerHTML = html;
        quizDiv.appendChild(block);
    });
}

renderQuiz();

function checkAnswer(id, selectedLetter) {
    let q = questions.find(x => x.id === id);
    let exp = document.getElementById(`exp${id}`);
    let fb = document.getElementById(`fb${id}`);

    exp.style.display = "block";

    if (selectedLetter === q.correct) {
        fb.style.color = "#4caf50";
        fb.innerHTML = "Correct!";
        exp.style.borderLeftColor = "#4caf50";
    } else {
        fb.style.color = "#f44336";
        fb.innerHTML = "Incorrect";
        exp.style.borderLeftColor = "#f44336";
    }
}

function submitQuiz() {
    let score = 0;

    questions.forEach(q => {
        let selected = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (selected && selected.value === q.correct) score++;
    });

    document.getElementById("result").innerHTML =
        `Final Score: <span style="color:#4fc3f7">${score}</span> / ${questions.length}`;
}
</script>

</body>
</html>
