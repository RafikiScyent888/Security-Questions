<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security+ V7 Quiz: Questions 61-80</title>
    <style>
        body {
            background-color: #89CFF0; /* Baby Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #quiz-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 750px;
            text-align: center;
        }
        .question-text {
            color: #00FF00; /* Bright Green */
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .option {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 1.1em;
            color: black; /* Black answers until selected */
            transition: 0.2s;
            text-align: left;
        }
        .option:hover:not([disabled]) {
            background-color: #f9f9f9;
        }
        /* Color logic after selection */
        .correct {
            color: #0077BE !important; /* Ocean Blue */
            border-color: #0077BE !important;
            font-weight: bold;
        }
        .incorrect {
            color: #FF0000 !important; /* Red */
            border-color: #FF0000 !important;
        }
        .controls, .nav-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button.action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button.action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #explanation-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f8ff;
            border-left: 5px solid #0077BE;
            text-align: left;
            display: none;
            color: #444;
        }
        .progress {
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #777;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="quiz-card">
    <div class="progress" id="progress">Question 61 of 80</div>
    <div class="question-text" id="question">Loading...</div>
    <div id="options-container"></div>
    
    <div class="controls">
        <button class="action-btn" onclick="resetCurrent()">Reset</button>
        <button class="action-btn" onclick="toggleExplanation()">Explanation</button>
    </div>

    <div id="explanation-box"></div>

    <div class="nav-buttons">
        <button class="action-btn" id="prev-btn" onclick="navigate(-1)">Previous</button>
        <button class="action-btn" id="next-btn" onclick="navigate(1)">Next</button>
    </div>
</div>

<script>
const quizData = [
    {
        q: "61. A security team creates a hardened baseline image for all company laptops before deployment. What is the PRIMARY purpose of the baseline? [cite: 306-307]",
        options: ["A. Reduce backup size", "B. Ensure consistent security configurations", "C. Eliminate all malware", "D. Increase processor performance"],
        correct: 1,
        exp: "1. A security baseline defines a minimum set of security requirements and configurations. 2. Applying this image to all laptops ensures that every device starts with a known, secure configuration. 3. This consistency simplifies management and reduces the chance of configuration drift."
    },
    {
        q: "62. An employee loses a company-issued smartphone containing confidential email. Which feature BEST protects company data? [cite: 307-308]",
        options: ["A. Screen timeout", "B. Mobile hotspot restriction", "C. Remote wipe capability", "D. Bluetooth pairing"],
        correct: 2,
        exp: "1. Remote wipe is a mobile device management (MDM) feature that allows administrators to erase all data from a lost or stolen device. 2. This is the most effective way to prevent unauthorized access to confidential emails when the physical device is no longer in the owner's possession. 3. It ensures that even if the screen lock is bypassed, the sensitive data is no longer on the storage."
    },
    {
        q: "63. A company configures wireless networks to require AES encryption and strong authentication for all users. Which wireless security standard BEST meets this requirement? [cite: 309-310]",
        options: ["A. WEP", "B. WPA", "C. WPA3", "D. Open authentication"],
        correct: 2,
        exp: "1. WPA3 is the latest wireless security standard designed to provide enhanced protection for modern networks. 2. It mandates the use of AES-based encryption (GCMP) and offers stronger authentication through Simultaneous Authentication of Equals (SAE). 3. Unlike WEP or WPA, WPA3 addresses many of the cryptographic weaknesses found in earlier protocols."
    },
    {
        q: "64. An organization executes suspicious applications inside an isolated environment to observe behavior without affecting production systems. Which technology is being used? [cite: 310-311]",
        options: ["A. Honeypot", "B. Sandboxing", "C. Container orchestration", "D. Tokenization"],
        correct: 1,
        exp: "1. Sandboxing is a security mechanism for separating running programs to prevent system failures and software vulnerabilities from spreading. 2. It creates a tightly controlled environment where suspicious code can be executed without risk to the host operating system or network. 3. Analysts use this to observe malware behavior safely and determine its intended function."
    },
    {
        q: "65. A company tracks all laptops using asset tags and inventory management software. Which operational function is being performed? [cite: 311-312]",
        options: ["A. Vulnerability scanning", "B. Asset management", "C. Threat hunting", "D. Penetration testing"],
        correct: 1,
        exp: "1. Asset management is the process of tracking physical hardware and software licenses throughout their lifecycle. 2. Using asset tags and inventory software allows an organization to know exactly what devices are on the network and who is responsible for them. 3. This is a foundational security practice because you cannot protect what you do not know you have."
    },
    {
        q: "66. A vulnerability scanner identifies outdated software versions on several servers. What should administrators do NEXT? [cite: 312-313]",
        options: ["A. Ignore the findings", "B. Replace the firewalls", "C. Remediate the vulnerabilities", "D. Disable logging"],
        correct: 2,
        exp: "1. Once vulnerabilities are identified by a scanner, the next logical step in the lifecycle is remediation. 2. Remediation involves applying patches, changing configurations, or implementing compensating controls to fix the security gap. 3. Delaying this step leaves the organization exposed to potential exploitation of known weaknesses."
    },
    {
        q: "67. A security analyst receives alerts whenever unusual outbound traffic volumes leave the corporate network. Which type of tool is MOST likely generating these alerts? [cite: 313-315]",
        options: ["A. DHCP server", "B. Load balancer", "C. Intrusion detection system (IDS)", "D. Proxy cache"],
        correct: 2,
        exp: "1. An Intrusion Detection System (IDS) monitors network traffic for suspicious patterns and policy violations. 2. Unusual outbound traffic volumes can indicate data exfiltration or a botnet infection, triggering an alert. 3. While a firewall blocks traffic, the IDS focuses on visibility and alerting the security team to potential breaches."
    },
    {
        q: "68. A company blocks access to known malicious domains before users can connect to them. Which enterprise security control is being used? [cite: 315-316]",
        options: ["A. NAC", "B. EDR", "C. DNS filtering", "D. Tokenization"],
        correct: 2,
        exp: "1. DNS filtering prevents users from accessing specific IP addresses or domains by blocking them at the DNS level. 2. By preventing the resolution of known malicious domains, the organization stops the connection before it can ever be established. 3. This is a highly effective way to block phishing sites and malware command-and-control (C2) servers."
    },
    {
        q: "69. A network only allows devices that meet company security requirements to connect to internal resources. Which technology is being implemented? [cite: 316-317]",
        options: ["A. IDS", "B. Network access control (NAC)", "C. SIEM", "D. DLP"],
        correct: 1,
        exp: "1. Network Access Control (NAC) is a security solution that enforces policy-based access to network resources. 2. It evaluates the security posture of a device (e.g., antivirus status, patch level) before allowing it to connect to the internal network. 3. This ensures that only 'healthy' and authorized devices can access sensitive corporate data."
    },
    {
        q: "70. A security platform monitors endpoints, correlates activity across systems, and automates threat response actions. Which solution BEST fits this description? [cite: 317-318]",
        options: ["A. VPN concentrator", "B. NAC", "C. XDR", "D. Proxy server"],
        correct: 2,
        exp: "1. Extended Detection and Response (XDR) provides a holistic view of security by integrating data from endpoints, networks, and cloud environments. 2. It correlates alerts from multiple sources to detect complex, multi-stage attacks that siloed tools might miss. 3. XDR also includes automated response capabilities to contain threats quickly across the entire infrastructure."
    },
    {
        q: "71. A company deploys multifactor authentication for remote employees logging into cloud applications. What is the PRIMARY security benefit? [cite: 318-319]",
        options: ["A. Increased network speed", "B. Reduced backup size", "C. Reduced risk of credential compromise", "D. Elimination of phishing attacks"],
        correct: 2,
        exp: "1. Multi-factor authentication (MFA) requires users to provide two or more verification factors to gain access. 2. Even if a password is stolen through phishing or a breach, the attacker cannot log in without the second factor (e.g., a phone app or token). 3. This significantly reduces the success rate of credential-based attacks."
    },
    {
        q: "72. A user authenticates once and gains access to several approved applications without re-entering credentials. Which identity solution is being used? [cite: 319-320]",
        options: ["A. Federation", "B. Single sign-on (SSO)", "C. Tokenization", "D. Privileged escalation"],
        correct: 1,
        exp: "1. Single Sign-On (SSO) allows a user to log in once and gain access to a variety of interconnected systems. 2. It improves user experience and security by reducing the number of passwords a user must remember and manage. 3. From an admin perspective, it centralizes access control and simplifies the deprovisioning process."
    },
    {
        q: "73. A company grants temporary elevated privileges to administrators only when critical maintenance tasks are performed. Which security tool is MOST likely being used? [cite: 320-322]",
        options: ["A. IDS", "B. DLP", "C. Privileged access management (PAM)", "D. SIEM"],
        correct: 2,
        exp: "1. Privileged Access Management (PAM) consists of technologies to exercise control over elevated access. 2. It allows for 'just-in-time' privilege elevation, granting high-level rights only when a specific task needs to be performed. 3. This prevents persistent administrative access, which is a major target for attackers."
    },
    {
        q: "74. A security operations team uses scripts to automatically isolate infected endpoints after malware is detected. Which concept is being demonstrated? [cite: 322-323]",
        options: ["A. Risk acceptance", "B. Automation and orchestration", "C. Data classification", "D. High availability"],
        correct: 1,
        exp: "1. Security Orchestration, Automation, and Response (SOAR) uses playbooks to execute repetitive security tasks without human intervention. 2. Automatically isolating an infected endpoint as soon as malware is detected minimizes the 'dwell time' of the threat. 3. This rapid response helps prevent lateral movement and limits the overall damage of an incident."
    },
    {
        q: "75. After detecting suspicious activity, a company follows a documented process to identify, contain, eradicate, and recover from the attack. Which process is being executed? [cite: 323-324]",
        options: ["A. Business continuity planning", "B. Incident response", "C. Change management", "D. Disaster recovery testing"],
        correct: 1,
        exp: "1. Incident response is a structured process used by organizations to handle security breaches and cyberattacks. 2. The standard phases include preparation, identification, containment, eradication, recovery, and lessons learned. 3. Following a documented plan ensures that the response is consistent, efficient, and thorough."
    },
    {
        q: "76. A security analyst reviews firewall, server, and authentication logs to determine how an attacker gained access. Which investigation activity is occurring? [cite: 324-325]",
        options: ["A. Vulnerability remediation", "B. Risk transference", "C. Digital forensics analysis", "D. Configuration baselining"],
        correct: 2,
        exp: "1. Digital forensics analysis involves the collection and examination of digital evidence after a security event. 2. Reviewing logs and system artifacts helps investigators reconstruct the timeline of an attack and identify the root cause. 3. This detailed analysis is vital for understanding how the breach occurred and preventing future recurrences."
    },
    {
        q: "77. A company conducts proactive searches through logs and endpoint data to identify hidden threats that automated tools may have missed. Which activity is this? [cite: 325-327]",
        options: ["A. Penetration testing", "B. Threat hunting", "C. Asset tagging", "D. Load balancing"],
        correct: 1,
        exp: "1. Threat hunting is a proactive security exercise where analysts manually search through data for indicators of compromise (IoCs). 2. It assumes that attackers may have already bypassed automated defenses and are hiding within the network. 3. By actively looking for anomalies, hunting teams can discover sophisticated 'living off the land' attacks."
    },
    {
        q: "78. An organization configures DLP rules to prevent employees from emailing customer credit card numbers outside the company. Which objective is MOST directly supported? [cite: 327-328]",
        options: ["A. Availability", "B. Authentication", "C. Preventing data exfiltration", "D. Network redundancy"],
        correct: 2,
        exp: "1. Data Loss Prevention (DLP) tools are designed to identify and block the unauthorized transfer of sensitive information. 2. Detecting credit card numbers in outbound emails allows the system to stop the message before the data leaves the organization. 3. This directly supports the confidentiality of customer data and helps maintain regulatory compliance."
    },
    {
        q: "79. A system administrator removes inactive user accounts after employees leave the company. Which IAM activity is being performed? [cite: 328-329]",
        options: ["A. Federation", "B. Deprovisioning", "C. Accounting", "D. Threat hunting"],
        correct: 1,
        exp: "1. Deprovisioning is the process of removing or disabling user access to systems and data when it is no longer required. 2. Regularly removing inactive accounts from former employees is a critical security hygiene practice. 3. It prevents 'orphan accounts' from being exploited by attackers to gain unauthorized entry to the network."
    },
    {
        q: "80. A security team validates that vulnerabilities were successfully fixed after patches were installed. Which step of vulnerability management is occurring? [cite: 329-330]",
        options: ["A. Identification", "B. Reporting", "C. Prioritization", "D. Validation"],
        correct: 3,
        exp: "1. Validation is the final step in the vulnerability management cycle where administrators confirm that a fix was successful. 2. Re-scanning systems after patching ensures that the vulnerability is truly gone and no new issues were introduced. 3. Without validation, an organization might mistakenly believe they are protected when the patch failed to install correctly."
    }
];

let currentIndex = 0;
let userAnswered = false;

function loadQuestion() {
    userAnswered = false;
    const data = quizData[currentIndex];
    document.getElementById("progress").innerText = `Question ${61 + currentIndex} of 80`;
    document.getElementById("question").innerText = data.q;
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    
    data.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "option";
        btn.onclick = () => selectOption(idx);
        container.appendChild(btn);
    });

    document.getElementById("explanation-box").style.display = "none";
    document.getElementById("explanation-box").innerText = data.exp;
    
    document.getElementById("prev-btn").disabled = currentIndex === 0;
    document.getElementById("next-btn").disabled = currentIndex === quizData.length - 1;
}

function selectOption(idx) {
    if (userAnswered) return;
    userAnswered = true;
    
    const data = quizData[currentIndex];
    const buttons = document.querySelectorAll(".option");
    
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === data.correct) {
            btn.classList.add("correct");
        } else if (i === idx) {
            btn.classList.add("incorrect");
        }
    });
}

function resetCurrent() {
    loadQuestion();
}

function toggleExplanation() {
    const box = document.getElementById("explanation-box");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}

function navigate(dir) {
    currentIndex += dir;
    loadQuestion();
}

// Initial load
loadQuestion();
</script>

</body>
</html>
