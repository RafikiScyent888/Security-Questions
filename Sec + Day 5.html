<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security+ Monitoring & Alerting Quiz</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e2e8f0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:900px;margin:auto}
.choice{display:block;width:100%;margin:6px 0;padding:12px;border-radius:8px;border:none;background:#334155;color:white;text-align:left;cursor:pointer}
.choice:hover{background:#475569}
.correct{background:#065f46!important}
.incorrect{background:#7f1d1d!important}
.progress{background:#334155;height:10px;border-radius:6px;margin-top:10px}
.bar{background:#22c55e;height:10px;border-radius:6px;width:0%}
details{margin-top:10px}
.hidden{display:none}
button{padding:10px 14px;border-radius:8px;border:none;background:#2563eb;color:white;margin-top:10px;cursor:pointer}
</style>
</head>

<body>
<div class="card">
<h2>Security+ Monitoring & Alerting Quiz</h2>
<div id="quiz"></div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next ▶</button>
<div class="progress"><div id="bar" class="bar"></div></div>
<h3 id="score"></h3>
</div>

<script>

// Correct answer is ALWAYS index 0 before shuffle
const quizData=[

{q:"Which monitoring platform aggregates logs and correlates alerts across enterprise security systems?",a:["Centralized SIEM analytics correlating multi source telemetry through behavioral detection engines","Endpoint configuration platform enforcing local device compliance through isolated host policies","Layer three routing device forwarding packets using static route configuration tables","Patch deployment service distributing vendor software updates through scheduled workflows"],e:"SIEM platforms aggregate and correlate logs."},

{q:"Which alerting technique reduces repetitive duplicate security notifications?",a:["Alert suppression consolidating recurring detections into grouped security notification events","Traffic mirroring duplicating packets toward dedicated analysis monitoring interfaces","Network segmentation dividing infrastructure through logical virtual LAN enforcement","Firmware lifecycle automation replacing outdated embedded device operating systems"],e:"Alert suppression reduces alert fatigue."},

{q:"Which monitoring solution analyzes endpoint behavior to detect suspicious runtime activity?",a:["Endpoint detection analytics monitoring processes through behavioral anomaly detection telemetry","Perimeter firewall inspection filtering inbound packets through static rule evaluation policies","Secure proxy service relaying outbound web traffic through content filtering mechanisms","System imaging platform deploying standardized workstation builds through automated scripts"],e:"EDR tools analyze endpoint behavior."},

{q:"Which log source records authentication successes and failures from identity providers?",a:["Directory service audit logs documenting login attempts and authorization validation events","Wireless controller metrics tracking device roaming behavior across enterprise access points","Switch forwarding tables listing learned MAC addresses across physical network interfaces","Printer job queues recording completed printing activity across departmental resources"],e:"Directory logs record authentication activity."},

{q:"Which monitoring practice validates alerts by correlating multiple telemetry sources?",a:["Event correlation comparing security data across diverse monitoring platforms for validation","Port scanning enumerating open services through sequential probing of network hosts","Configuration auditing verifying system baselines against regulatory compliance standards","Backup restoration testing validating disaster recovery procedures through scheduled simulations"],e:"Event correlation confirms suspicious activity."},

{q:"Which alert severity classification requires immediate containment response actions?",a:["Critical severity classification indicating confirmed malicious activity requiring urgent mitigation","Informational severity classification documenting normal operational system status messages","Low severity classification describing minor deviations unlikely to affect enterprise operations","Medium severity classification indicating suspicious activity requiring standard investigation"],e:"Critical alerts require immediate action."},

{q:"Which monitoring method establishes normal activity baselines to identify anomalies?",a:["Behavioral analytics comparing current metrics against historical baseline performance thresholds","Signature inspection matching network packets against predefined threat detection rules","Manual log review analyzing archived events through periodic analyst investigation","Compliance scanning validating device configurations against industry benchmark templates"],e:"Behavioral analytics detect deviations from baselines."},

{q:"Which tool inspects packet captures to identify suspicious protocol anomalies?",a:["Network protocol analyzer dissecting captured traffic using deep packet inspection techniques","Endpoint configuration manager deploying standardized security baselines across enterprise devices","Federated identity service providing cross domain authentication through trust relationships","Database optimization engine restructuring queries to improve application performance"],e:"Protocol analyzers examine packet captures."},

{q:"Which monitoring output occurs when detection rule conditions are met?",a:["Automated alert notification generated after predefined detection thresholds are exceeded","Maintenance schedule report documenting upcoming planned service downtime periods","Asset inventory export listing approved enterprise hardware and licensed software resources","Capacity forecast analysis predicting future storage utilization across production systems"],e:"Alerts are generated when rules trigger."},

{q:"Which alert tuning practice reduces false positives while maintaining detection coverage?",a:["Detection rule refinement adjusting thresholds using validated historical incident telemetry","Network expansion extending monitoring visibility into newly deployed organizational subnets","Backup retention modification altering archival storage lifecycle management policies","Encryption enforcement applying cryptographic protections across enterprise application traffic"],e:"Rule tuning reduces false positives."},

{q:"Which monitoring platform identifies abnormal outbound traffic suggesting data exfiltration?",a:["Network traffic analysis engine evaluating outbound flows using behavioral anomaly detection models","Operating system hardening toolkit disabling unnecessary services across endpoint builds","Cloud orchestration system provisioning virtual machines during workload scaling operations","Wireless management controller optimizing signal distribution across office floor deployments"],e:"NTA tools detect abnormal outbound traffic."},

{q:"Which prioritization method ranks alerts based on potential organizational risk impact?",a:["Risk based prioritization scoring incidents using asset value and threat likelihood calculations","Chronological sorting arranging alerts based solely on timestamp order of occurrence","Alphabetical categorization organizing events through standardized naming conventions","Geographic grouping clustering alerts based on physical infrastructure deployment locations"],e:"Risk-based prioritization evaluates impact and likelihood."},

{q:"Which monitoring solution analyzes DNS queries to detect suspicious domains?",a:["DNS telemetry monitoring platform capturing query logs for anomaly detection analysis","Switch configuration utility modifying VLAN assignments across enterprise network infrastructure","Certificate authority server issuing digital certificates for encrypted communication channels","File compression utility reducing archive sizes for efficient long term storage management"],e:"DNS monitoring detects malicious domains."},

{q:"Which detection approach compares file hashes against known malicious signatures?",a:["Signature based detection verifying file fingerprints against curated threat intelligence databases","Behavioral anomaly detection comparing runtime user activity against established usage baselines","Manual threat hunting analyzing historical telemetry through investigator driven research methods","Compliance monitoring validating configurations against published regulatory frameworks"],e:"Signature detection uses known malicious hashes."},

{q:"Which monitoring capability detects abnormal privilege escalation attempts?",a:["User behavior analytics monitoring privilege changes through contextual access pattern analysis","Bandwidth optimization appliance compressing traffic streams to improve network performance","Disk defragmentation utility reorganizing storage sectors to improve read write efficiency","Time synchronization service aligning device clocks using centralized network protocols"],e:"UBA identifies abnormal privilege changes."},

{q:"Which log source best detects unauthorized firewall configuration changes?",a:["Firewall administrative audit logs documenting rule modifications and configuration updates","Wireless interference reports measuring channel congestion across access point deployments","Printer usage metrics summarizing departmental printing activity across shared resources","Operating system boot records documenting workstation startup times across enterprise fleets"],e:"Firewall admin logs record configuration changes."},

{q:"Which alert suggests a brute force login attack against authentication services?",a:["Repeated failed authentication attempts exceeding predefined account lockout thresholds","Authorized software installation logs generated during scheduled enterprise deployment windows","Scheduled system restarts performed following approved patch management cycles","Routine vulnerability scans identifying outdated packages across managed production servers"],e:"Multiple login failures indicate brute force attacks."},

{q:"Which monitoring strategy detects lateral movement across internal networks?",a:["East west traffic monitoring analyzing internal communication patterns for abnormal behavior","North south filtering inspecting inbound internet traffic through perimeter gateway devices","Peripheral hardware inventory tracking authorized USB device usage across endpoints","Electrical consumption monitoring measuring power utilization across data center equipment"],e:"East-west monitoring identifies lateral movement."},

{q:"Which alert pattern indicates malware beaconing to command infrastructure?",a:["Consistent periodic outbound connections to a single external destination at regular intervals","Large enterprise software update downloads during approved scheduled maintenance windows","Short DNS query bursts generated during typical authenticated web browsing activities","Routine database synchronization uploads executed during automated nightly backup processes"],e:"Regular outbound communication indicates beaconing."},

{q:"Which monitoring platform correlates vulnerability scan results with active threat alerts?",a:["Integrated security analytics platform combining vulnerability findings with real time event correlation","Desktop imaging system deploying standardized operating systems across enterprise endpoints","Load balancing appliance distributing incoming web traffic across redundant application servers","Virtual desktop infrastructure hosting remote sessions through centralized hypervisor clusters"],e:"Integrated analytics correlate vulnerabilities with alerts."},

{q:"Which monitoring metric may indicate a denial of service attack?",a:["Sudden spike in inbound connections exceeding historical baseline network traffic patterns","Gradual increase in employee login frequency during normal operational business hours","Stable CPU utilization observed during predictable scheduled batch processing operations","Incremental storage growth caused by routine automated database backup archival"],e:"Traffic spikes suggest DoS attacks."},

{q:"Which monitoring solution analyzes web application logs for injection attempts?",a:["Web application firewall analytics inspecting HTTP request payloads for malicious input patterns","Layer two switch monitoring system recording MAC address learning events across network ports","System temperature monitoring utility tracking hardware thermal performance across servers","Help desk ticketing system categorizing user support requests using standardized templates"],e:"WAF analytics detect injection attacks."},

{q:"Which alert indicates possible data staging prior to exfiltration?",a:["Large sensitive files aggregated into temporary directories outside normal workflow patterns","Routine archive compression jobs executed during scheduled enterprise backup automation","Patch repository synchronization downloading update packages during maintenance windows","Operating system cache files expanding temporarily during high performance application execution"],e:"Unexpected file staging can indicate exfiltration preparation."},

{q:"Which monitoring process proactively searches historical logs for hidden threats?",a:["Threat hunting analysis reviewing archived telemetry through hypothesis driven investigative methods","Routine log rotation archiving historical records to conserve available disk storage capacity","Configuration baseline enforcement applying standardized hardening policies across endpoints","Infrastructure provisioning automation deploying servers through predefined template scripts"],e:"Threat hunting proactively searches for hidden threats."},

{q:"Which alert suggests insider threat behavior involving abnormal file access?",a:["User accessing large volumes of sensitive files outside established working hour patterns","Employee updating contact information through authorized human resource management portals","Administrator deploying approved system updates during scheduled maintenance operations","Department staff printing quarterly business reports during normal reporting cycle periods"],e:"Abnormal file access can indicate insider threats."},

{q:"Which monitoring technique detects impossible travel login scenarios?",a:["Geolocation anomaly detection comparing login timestamps against realistic travel duration thresholds","Password expiration enforcement requiring credential rotation through scheduled authentication policies","Certificate validation verifying encrypted sessions using trusted public key infrastructures","Disk quota monitoring limiting storage allocation across departmental shared file repositories"],e:"Impossible travel detection flags suspicious logins."},

{q:"Which monitoring tool detects malicious scripts executed inside web browsers?",a:["Endpoint browser telemetry monitoring script execution using runtime behavioral anomaly detection","Network address translation gateway converting private addresses for outbound internet connectivity","Cloud billing dashboard summarizing monthly infrastructure resource consumption reports","System uptime tracker reporting availability metrics for business critical application services"],e:"Browser monitoring detects malicious scripts."},

{q:"Which alert indicates unauthorized persistence mechanisms after reboot?",a:["Unapproved startup registry entries created outside authorized enterprise application deployment tools","Temporary diagnostic log files generated during scheduled system performance benchmarking","Driver updates installed automatically through vendor supported hardware update utilities","Group policy refresh operations applied across domain joined workstations during synchronization"],e:"Unauthorized startup entries indicate persistence."},

{q:"Which monitoring approach correlates badge access logs with workstation login events?",a:["Context aware authentication analytics comparing physical entry records against digital login timestamps","Network throughput monitoring measuring bandwidth consumption across enterprise departments","Asset lifecycle management tracking procurement stages of new hardware inventory requests","Printer queue optimization distributing print jobs across multiple shared network print servers"],e:"Correlating physical and logical access improves detection."},

{q:"Which monitoring control analyzes cloud API activity for suspicious administrative behavior?",a:["Cloud activity monitoring platform evaluating API calls using anomaly detection and behavior baselines","Local disk monitoring utility tracking storage fragmentation levels across endpoint devices","Wireless signal survey tool mapping coverage strength across corporate office floor layouts","Environmental monitoring sensor measuring humidity levels inside data center facilities"],e:"Cloud monitoring detects suspicious API actions."}

];

// -------- SHUFFLE ANSWERS ----------
function shuffle(q){
let arr=q.a.map((t,i)=>({text:t,correct:i===0}));
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
q.answers=arr.map(x=>x.text);
q.correctIndex=arr.findIndex(x=>x.correct);
}
quizData.forEach(q=>shuffle(q));

// -------- QUIZ ENGINE ----------
let current=0,score=0,answered=false;

function loadQ(){
answered=false;
document.getElementById("nextBtn").classList.add("hidden");
let q=quizData[current];
let html=`<h3>Question ${current+1}: ${q.q}</h3>`;
q.answers.forEach((ans,i)=>{
html+=`<button class="choice" onclick="answer(${i})">${String.fromCharCode(65+i)}) ${ans}</button>`;
});
html+=`<details><summary>Explanation</summary>${q.e}</details>`;
document.getElementById("quiz").innerHTML=html;
document.getElementById("bar").style.width=(current/quizData.length*100)+"%";
}

function answer(i){
if(answered)return;
answered=true;
let q=quizData[current];
let buttons=document.querySelectorAll(".choice");
buttons.forEach((b,index)=>{
b.disabled=true;
if(index===q.correctIndex)b.classList.add("correct");
if(index===i && index!==q.correctIndex)b.classList.add("incorrect");
});
if(i===q.correctIndex)score++;
document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
current++;
if(current<quizData.length){loadQ()}
else{
document.getElementById("quiz").innerHTML="<h3>Quiz Complete</h3>";
document.getElementById("score").innerText="Score: "+score+" / "+quizData.length;
document.getElementById("bar").style.width="100%";
document.getElementById("nextBtn").classList.add("hidden");
}
}

loadQ();
</script>
</body>
</html>
